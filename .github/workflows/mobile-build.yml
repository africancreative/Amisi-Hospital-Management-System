name: Mobile App Build (Android & iOS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mobile:
    runs-on: macos-latest
    
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' # Use a stable flutter version
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build iOS App
        run: flutter build ios --release --no-codesign

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amisimedos-android-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amisimedos-ios-app
          path: apps/mobile/build/ios/iphoneos/Runner.app
