<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320">
  <!-- Gold arc - partial circle on left and bottom -->
  <path d="M 150 25 A 115 115 0 1 0 265 140" fill="none" stroke="#D97706" stroke-width="18" stroke-linecap="round"/>

  <!-- Blue triangle / mountain body -->
  <polygon points="150,38 248,188 52,188" fill="#2563EB"/>

  <!-- White diagonal stripe lines across triangle -->
  <line x1="80" y1="178" x2="145" y2="55" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="100" y1="188" x2="165" y2="65" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- White medical cross at apex -->
  <rect x="142" y="48" width="16" height="10" fill="white" rx="2"/>
  <rect x="146" y="42" width="8" height="22" fill="white" rx="2"/>

  <!-- Gold base accent -->
  <polygon points="110,188 190,188 220,175 80,175" fill="#D97706" opacity="0.85"/>

  <!-- Scattered pixel squares - top right -->
  <rect x="200" y="48" width="22" height="22" fill="#2563EB" rx="2"/>
  <rect x="226" y="38" width="18" height="18" fill="#D97706" rx="2"/>
  <rect x="226" y="60" width="16" height="16" fill="#2563EB" rx="2"/>
  <rect x="200" y="74" width="15" height="15" fill="#2563EB" rx="2"/>
  <rect x="218" y="80" width="13" height="13" fill="#2563EB" rx="2"/>
  <rect x="210" y="97" width="10" height="10" fill="#D97706" rx="2"/>

  <!-- Small caduceus square -->
  <rect x="200" y="97" width="18" height="18" fill="#1D4ED8" rx="2"/>
  <text x="209" y="111" font-size="13" fill="white" text-anchor="middle" font-family="serif">⚕</text>

  <!-- "Amisi MedOS" text -->
  <text x="150" y="248" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#2563EB" text-anchor="middle" letter-spacing="0.5">Amisi MedOS</text>
</svg>